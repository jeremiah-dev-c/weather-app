<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather App</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="app">

    <div id="top-bar">
      <h1 id="app-title">Weather</h1>
      <span id="date-label"></span>
    </div>

    <div id="search-wrap">
      <input id="city-input" type="text" placeholder="Search a city..." autocomplete="off" readonly />
      <div id="dropdown">
      </div>
    </div>

    <div id="city-switcher">
    </div>

    <div id="main-card">
      <div id="hero-top">
        <span id="main-icon"></span>
        <div id="hero-right">
          <span id="main-temp"></span>
          <span id="main-unit">°C</span>
        </div>
      </div>
      <div id="main-condition"></div>
      <div id="main-city-name"></div>
    </div>

    <div id="stats-row">

      <div id="stat-rain-card">
        <div id="stat-rain-lbl">Rain</div>
        <div id="stat-rain"></div>
      </div>

      <div id="stat-wind-card">
        <div id="stat-wind-lbl">Wind</div>
        <div id="stat-wind"></div>
      </div>

      <div id="stat-humidity-card">
        <div id="stat-humidity-lbl">Humidity</div>
        <div id="stat-humidity"></div>
      </div>

    </div>

    <div id="forecast">
      <div id="forecast-title">5-day forecast</div>
      <div id="forecast-list">
      </div>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
